<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animal Encyclopedia</title>
  <link rel="stylesheet" href="searchFinder.css">
</head>
<body>

<header>
  <h1>🐾 Animal Encyclopedia</h1>
</header>

<div class="controls">
  <input type="text" id="search" placeholder="Search animal...">
  <select id="categoryFilter">
    <option value="all">All Categories</option>
    <option value="Mammal">Mammal</option>
    <option value="Bird">Bird</option>
    <option value="Reptile">Reptile</option>
  </select>
</div>

<div class="container" id="animalContainer"></div>

<div class="details" id="detailsBox">
  <div class="details-content">
    <span class="close" onclick="closeDetails()">✖</span>
    <h2 id="detailName"></h2>
    <p><strong>Category:</strong> <span id="detailCategory"></span></p>
    <p><strong>Habitat:</strong> <span id="detailHabitat"></span></p>
    <p><strong>Diet:</strong> <span id="detailDiet"></span></p>
  </div>
</div>

<script src="searchFinder.js"></script>
</body>
</html>
